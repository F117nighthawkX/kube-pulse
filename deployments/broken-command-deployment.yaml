# Using an invalid command to simulate a broken deployment with CrashLoopBackOff status
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-command-deployment
  labels:
    app: broken-command
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-command
  template:
    metadata:
      labels:
        app: broken-command
    spec:
      containers:
      - name: broken-command
        image: busybox
        command: ["/bin/sh", "-c", "echo 'Simulating startup failure'", "exit 1"] # Should cause the container to fail
        ports:
        - containerPort: 80
        resources:
          limits:
            cpu: "250m"
            memory: "128Mi"
          requests:
            cpu: "50m"
            memory: "64Mi"
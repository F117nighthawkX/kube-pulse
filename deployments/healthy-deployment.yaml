# Default deployment from https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#creating-a-deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthy-nginx-deployment
  labels:
    app: healthy-nginx
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthy-nginx
  template:
    metadata:
      labels:
        app: healthy-nginx
    spec:
      containers:
      - name: nginx
        image: nginx:1.14.2
        ports:
        - containerPort: 80
# Using an invalid image to simulate a broken deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: broken-nginx-deployment
  labels:
    app: broken-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: broken-nginx
  template:
    metadata:
      labels:
        app: broken-nginx
    spec:
      containers:
      - name: broken-nginx
        image: power:9000
        ports:
        - containerPort: 80